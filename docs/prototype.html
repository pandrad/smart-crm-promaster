  <style>

    .card-hover:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .tag { display:inline-flex; align-items:center; padding: 2px 8px; border-radius:9999px; font-size:11px; font-weight:600; white-space:nowrap; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .drawer { position:fixed; top:0; right:0; height:100vh; width:480px; max-width:95vw; background:white; z-index:50; overflow-y:auto; box-shadow:-4px 0 30px rgba(0,0,0,0.12); }

// ─── Small components ──────────────────────────────────────────────────────
function UrgencyTag({ deadline }) {
  const d = daysLeft(deadline);
  if (d < 0)  return <span className="tag" style={{background:"#fee2e2",color:"#dc2626"}}>⚠ {Math.abs(d)}d atraso</span>;
  if (d === 0) return <span className="tag" style={{background:"#fef3c7",color:"#b45309"}}>Hoje</span>;
  if (d <= 2)  return <span className="tag" style={{background:"#ffedd5",color:"#c2410c"}}>{d}d</span>;
  return           <span className="tag" style={{background:"#f0fdf4",color:"#15803d"}}>{d}d</span>;
}

function StageBadge({ id }) {
  const s = STAGES.find(x => x.id === id);
  return s ? <span className="tag" style={{background:s.bg, color:s.color}}>{s.label}</span> : null;
}

function FUBadge({ v }) {
  const c = FU_COLORS[v] || { bg:"#f1f5f9", c:"#64748b" };
  return <span className="tag" style={{background:c.bg, color:c.c}}>{v}</span>;
}

function Avatar({ name }) {
  const initials = name.split(" ").map(w=>w[0]).slice(0,2).join("");
  const palette = ["#6366f1","#0ea5e9","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899"];
  const bg = palette[name.charCodeAt(0) % palette.length];
  return (
    <div title={name} style={{background:bg, width:26, height:26, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", color:"white", fontSize:10, fontWeight:700, flexShrink:0}}>
      {initials}
    </div>
  );
}

// ─── Detail Drawer ─────────────────────────────────────────────────────────

  return (

      <div className="drawer">
        {/* header */}
        <div style={{position:"sticky",top:0,background:"white",borderBottom:"1px solid #f1f5f9",padding:"16px 24px",zIndex:1}}>

            <div>

          {/* overdue alert */}

              <span style={{fontSize:13,color:"#b91c1c",fontWeight:500}}>Processo com {Math.abs(d)} dia(s) de atraso</span>

// ─── Kanban Card ───────────────────────────────────────────────────────────
function KanbanCard({ p, onClick }) {
  const d = daysLeft(p.deadline);
  const borderColor = d < 0 ? "#ef4444" : d <= 2 ? "#f59e0b" : "#e2e8f0";
  return (
    <div className="card-hover" onClick={()=>onClick(p)}
      style={{background:"white",borderRadius:10,border:`1px solid ${borderColor}`,borderLeft:`3px solid ${borderColor}`,padding:"10px 12px",marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:10,color:"#94a3b8",fontFamily:"monospace"}}>#{p.id}</span>
        {p.priority==="Alta" && <span style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",display:"inline-block"}}/>}
      </div>
      <div style={{fontSize:13,fontWeight:600,color:"#1e293b",marginBottom:4,lineHeight:1.3}}>{p.client}</div>
      <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>{p.brand}{p.model ? ` · ${p.model}` : ""}</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <Avatar name={p.owner}/>
          <span style={{fontSize:11,color:"#64748b"}}>{p.owner.split(" ")[0]}</span>
        </div>
        <UrgencyTag deadline={p.deadline}/>
      </div>
      {p.emails > 0 && (
        <div style={{display:"flex",alignItems:"center",gap:4,marginTop:6,color:"#94a3b8",fontSize:11}}>
          <Ico name="mail" size={10}/> {p.emails} email{p.emails!==1?"s":""}
        </div>
      )}
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────

    return () => clearTimeout(t);
  }, []);

              <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{s.label}</div>

        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94a3b8",pointerEvents:"none"}}>
            <Ico name="search" size={13}/>
          </span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Pesquisar…"
            style={{paddingLeft:30,paddingRight:12,paddingTop:7,paddingBottom:7,fontSize:13,border:"1px solid #e2e8f0",borderRadius:8,outline:"none",width:200,background:"white"}}/>
        </div>
        <select value={ownerFilter} onChange={e=>setOwnerFilter(e.target.value)}
          style={{fontSize:13,border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",background:"white",outline:"none"}}>
          <option>Todos</option>
          {OWNERS.map(o=><option key={o}>{o}</option>)}
        </select>
        <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}
          style={{fontSize:13,border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",background:"white",outline:"none"}}>
          <option value="Todos">Todos os estados</option>
          {STAGES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
        </select>
        <div style={{marginLeft:"auto",display:"flex",border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden",background:"white"}}>
          {[["table","list","Tabela"],["kanban","columns","Kanban"]].map(([v,ic,label])=>(
            <button key={v} onClick={()=>setView(v)}
              style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",fontSize:13,fontWeight:500,border:"none",cursor:"pointer",
                background: view===v ? "#2563eb" : "white",
                color:      view===v ? "white"   : "#64748b"}}>
              <Ico name={ic} size={13} color={view===v?"white":"#64748b"}/> {label}
            </button>
          ))}
        </div>
      </div>

      {/* TABLE */}
      {view==="table" && (
        <div style={{padding:"0 24px 32px"}}>
          <div style={{background:"white",borderRadius:12,border:"1px solid #f1f5f9",overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:1100}}>
              <thead>
                <tr style={{background:"#f8fafc",borderBottom:"1px solid #f1f5f9"}}>
                  {["Nº","Criado","Prazo","Prio","Estado","Follow Up","Cliente","Marca","Modelo","Resp. Cotação","Resp. Comercial","Requerente","Valor","Emails"].map(h=>(
                    <th key={h} style={{padding:"10px 12px",fontSize:11,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em",textAlign:"left",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map(p => {
                  const d = daysLeft(p.deadline);
                  return (
                    <tr key={p.id} onClick={()=>setSelected(p)} style={{borderBottom:"1px solid #f8fafc",cursor:"pointer",background: d<0&&p.status<6 ? "#fff5f5" : "white"}}>
                      <td style={{padding:"10px 12px",fontSize:11,fontFamily:"monospace",color:"#94a3b8"}}>{p.id}</td>
                      <td style={{padding:"10px 12px",fontSize:12,color:"#64748b"}}>{p.created}</td>
                      <td style={{padding:"10px 12px"}}><UrgencyTag deadline={p.deadline}/></td>
                      <td style={{padding:"10px 12px"}}>
                        <span style={{width:8,height:8,borderRadius:"50%",background:p.priority==="Alta"?"#ef4444":"#cbd5e1",display:"inline-block"}} title={p.priority}/>
                      </td>
                      <td style={{padding:"10px 12px"}}><StageBadge id={p.status}/></td>
                      <td style={{padding:"10px 12px"}}><FUBadge v={p.fu}/></td>
                      <td style={{padding:"10px 12px",fontSize:12,fontWeight:600,color:"#1e293b",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.client}</td>
                      <td style={{padding:"10px 12px",fontSize:12,color:"#64748b"}}>{p.brand}</td>
                      <td style={{padding:"10px 12px",fontSize:12,color:"#64748b"}}>{p.model||"—"}</td>
                      <td style={{padding:"10px 12px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}><Avatar name={p.owner}/><span style={{fontSize:12,color:"#475569"}}>{p.owner.split(" ")[0]}</span></div>
                      </td>
                      <td style={{padding:"10px 12px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}><Avatar name={p.comm}/><span style={{fontSize:12,color:"#475569"}}>{p.comm.split(" ")[0]}</span></div>
                      </td>
                      <td style={{padding:"10px 12px",fontSize:12,color:"#64748b"}}>{p.req}</td>
                      <td style={{padding:"10px 12px",fontSize:12,fontWeight:p.price?600:400,color:p.price?"#1e293b":"#94a3b8"}}>
                        {p.price ? "€"+p.price.toLocaleString("pt-PT") : "—"}
                      </td>
                      <td style={{padding:"10px 12px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:"#94a3b8"}}><Ico name="mail" size={11}/>{p.emails}</div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {rows.length===0 && <p style={{textAlign:"center",color:"#94a3b8",padding:"40px 0",fontSize:13}}>Nenhum processo encontrado</p>}
          </div>
        </div>
      )}

      {/* KANBAN */}
      {view==="kanban" && (
        <div style={{padding:"0 24px 32px",overflowX:"auto"}}>
          <div style={{display:"flex",gap:12,minWidth:STAGES.length*210}}>
            {STAGES.map(stage => {
              const cards = rows.filter(p => p.status===stage.id);
              return (
                <div key={stage.id} style={{width:200,flexShrink:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontSize:11,fontWeight:700,color:stage.color}}>{stage.label}</span>
                    <span style={{fontSize:11,background:"white",border:"1px solid #e2e8f0",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b",fontWeight:700}}>{cards.length}</span>
                  </div>
                  <div className="kanban-col">
                    {cards.map(p=><KanbanCard key={p.id} p={p} onClick={setSelected}/>)}
                    {cards.length===0 && <div style={{textAlign:"center",color:"#cbd5e1",fontSize:12,padding:"24px 0"}}>Vazio</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Drawer */}
      {selected && <Drawer p={selected} onClose={()=>setSelected(null)}/>}

      {/* Toast */}
      {toast && (
        <div className="toast">
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"#dbeafe",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <Ico name="mail" size={16} color="#2563eb"/>
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:12,fontWeight:700,color:"#1e293b"}}>Novo email detectado</span>
                <button onClick={()=>setToast(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",padding:0}}><Ico name="x" size={13}/></button>
              </div>
              <div style={{fontSize:11,color:"#64748b",marginTop:2}}>De: <strong>carlos.menezes@terramovida.pt</strong></div>
              <div style={{fontSize:12,color:"#475569",marginTop:4}}>"Solicito cotação urgente para VOLVO EC480E…"</div>
              <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                <span className="tag" style={{background:"#e0f2fe",color:"#0369a1"}}>🤖 VOLVO EC480E</span>
                <span className="tag" style={{background:"#dcfce7",color:"#15803d"}}>Novo cliente</span>
              </div>
              <div style={{fontSize:10,color:"#94a3b8",marginTop:6}}>Processo criado automaticamente → #2004631</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
